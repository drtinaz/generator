# =============================================================================
# Dynamic Transfer Switch Configuration File
# =============================================================================
# This file configures the combined transfer switch management and 
# generator auto current derating script.
#
# The script monitors a digital input configured as a transfer switch and
# automatically switches between grid and generator settings. When the generator
# is running and "Gen Auto Current" is enabled, it automatically derates the
# generator output based on temperature and altitude.
#
# Do not use quotes around values.
# =============================================================================

# -----------------------------------------------------------------------------
# Derating Constants
# -----------------------------------------------------------------------------
# These constants control how the generator output is derated based on
# environmental conditions.

[DeratingConstants]

# The ambient temperature (in Fahrenheit) at which the generator output begins to be derated.
# Below this temperature, no temperature-based derating is applied.
# Example: 77.0 means derating starts above 77°F
BaseTemperatureThresholdF = 77.0

# The multiplier for derating above the base temperature.
# This value determines how aggressively the output is reduced as temperature rises.
# Example: For 6% derating per 10°F, the coefficient is 0.06 / 10 = 0.006
# Formula: derate = 1 - ((current_temp - threshold) * coefficient)
TempCoefficient = 0.006

# The multiplier for derating per foot above sea level.
# This accounts for reduced air density at higher altitudes.
# Example: For 3% derating per 1000 ft, the coefficient is 0.03 / 1000 = 0.00003
# Formula: derate = 1 - (altitude_feet * coefficient)
AltitudeCoefficient = 0.00003

# The rated output capacity of the generator at sea level and base temperature, in amps.
# This is the maximum current the generator can supply under ideal conditions.
BaseGeneratorOutputAmps = 62.5

# A safety buffer to prevent the generator from operating at its absolute maximum calculated output.
# This provides a margin of safety for sustained operation.
# Example: 0.9 limits output to 90% of the calculated capacity
OutputBuffer = 0.9

# The generator temperature (in Fahrenheit) at which to apply the high temperature reduction.
# When generator temperature reaches this point, the HighGenTempReduction is applied.
HighGenTempThresholdF = 220.0

# The generator temperature (in Fahrenheit) at which to apply the medium temperature reduction.
# When generator temperature reaches this point, the MediumGenTempReduction is applied.
MediumGenTempThresholdF = 212.0

# The percentage (in decimal form) to reduce the output by when the high temperature threshold is reached.
# Example: 0.85 reduces output to 85% of the calculated value
HighGenTempReduction = 0.85

# The percentage (in decimal form) to reduce the output by when the medium temperature threshold is reached.
# Example: 0.90 reduces output to 90% of the calculated value
MediumGenTempReduction = 0.90


# -----------------------------------------------------------------------------
# Default Sensor Values
# -----------------------------------------------------------------------------
# These values are used when a required sensor (GPS, Temperature) is not found or unavailable.
# They ensure the script can still function even without complete sensor data.

[DefaultSensorValues]

# Default altitude in feet to use when the GPS service is unavailable.
# This is used in altitude derating calculations.
DefaultAltitudeFeet = 1000.0

# Default generator temperature in Fahrenheit to use when the sensor is unavailable.
# This is used in generator temperature derating calculations.
DefaultGeneratorTempF = 180.0

# Default outdoor temperature in Fahrenheit to use when the sensor is unavailable.
# This is used in ambient temperature derating calculations.
DefaultOutdoorTempF = 77.0


# -----------------------------------------------------------------------------
# Transfer Settings
# -----------------------------------------------------------------------------
# These settings control the behavior of the transfer switch and derating system.

[TransferSettings]

# Time in seconds to wait after the generator stops before switching to grid/shore power.
# This delay allows the generator to cool down and stabilize before transferring.
# During this time, ALL other operations are dropped to prevent race conditions.
# Typical values: 3-10 seconds
shutdown_timer = 5

# Minimum altitude change in feet required to trigger a derating recalculation.
# GPS altitude can fluctuate due to signal quality; this buffer prevents unnecessary
# recalculations from minor variations.
# Set higher for noisy GPS signals, lower for precise altitude tracking.
# Typical values: 20-100 feet
altitude_buffer_ft = 50.0

# Minimum temperature change in Fahrenheit required to trigger a derating recalculation.
# Temperature sensors can have noise; this buffer prevents excessive recalculations.
# Set higher for noisy sensors, lower for precise temperature tracking.
# Typical values: 0.5-2.0 degrees Fahrenheit
temp_buffer_f = 1.0

# Debounce time in milliseconds for rapid sensor changes.
# When multiple sensors change in quick succession (e.g., generator start), 
# this delay prevents multiple rapid derating recalculations.
# Typical values: 300-1000 milliseconds
derating_debounce_ms = 500


# =============================================================================
# Notes on Operation
# =============================================================================
#
# 1. Digital Input Configuration:
#    - One digital input must be configured with function "Bilge Pump" (NOT bilge alarm)
#    - The custom name must be set to "Transfer Switch"
#    - This input should be connected to a contact closure on the external transfer switch
#
# 2. Gen Auto Current Configuration:
#    - One digital input must be configured with function "Generator Auto Start"
#    - The product name should be set to "Gen Auto Current"
#    - When enabled, the script automatically derates generator output
#    - When disabled, normal two-way sync operates without derating
#
# 3. Transfer Behavior:
#    - When switching to generator: Settings applied immediately
#    - When switching to grid: Waits for shutdown_timer seconds before transferring
#    - During transfers: ALL operations are dropped to prevent race conditions
#    - IgnoreAcIn1 is checked with 5 retries at 1-second intervals
#
# 4. Derating Behavior:
#    - Only active when Gen Auto Current input is ON
#    - Generator running: Derated value written to BOTH active and stored limits
#    - Generator off: Derated value written to stored limit only (for next start)
#    - User overrides are temporary - derating will reapply calculated values
#    - Sensor changes trigger recalculation only when exceeding buffer thresholds
#
# 5. Two-Way Sync:
#    - When derating OFF: User changes sync both ways (active ↔ stored)
#    - When derating ON: Derated values override user changes for generator limits
#    - Grid limits always sync normally (unaffected by derating)
#
# 6. Signal-Based Monitoring:
#    - All sensors and inputs use D-Bus signals for instant response
#    - No polling overhead - only recalculates when values actually change
#    - Altitude and temperature buffers prevent unnecessary recalculations
#
# =============================================================================
